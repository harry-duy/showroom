<div class="w3-container w3-padding-32" id="products">
    <h2 class="w3-border-bottom w3-border-light-grey w3-padding-16">Products</h2>
</div>

<div class="w3-row-padding" th:each="row : ${#numbers.sequence(1, 3)}">
    <div class="w3-col l3 m6 w3-margin-bottom" th:each="col : ${#numbers.sequence(1, 4)}">
        <div class="w3-display-container">
            <div class="w3-display-topleft w3-black w3-padding" th:text="|House ${col}|"></div>
            <img th:src="@{|/images/products/${col}.jpg|}" th:alt="|House ${col}|" style="width:100%">
        </div>
    </div>
</div>
