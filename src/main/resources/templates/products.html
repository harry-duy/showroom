<div class="w3-container w3-padding-32" id="products">
    <h3 class="w3-border-bottom w3-border-light-grey w3-padding-16">Products</h3>
</div>

<div th:each="i : ${#numbers.sequence(0, products.size() - 1, 4)}" class="w3-row-padding">
    <div th:each="j : ${#numbers.sequence(i, i + 3)}"
         th:if="${j < products.size()}"
         th:with="p = ${products[j]}"
         class="w3-col l3 m6 w3-margin-bottom">
        <div class="w3-display-container" style="background:#eee; aspect-ratio: 3/2; overflow:hidden;">
            <img th:src="@{|/files/products/${p.id()}.jpg|}"
                 th:alt="${p.name()}"
                 style="width:100%; height:100%; object-fit:cover; display:block;">
            <div th:text="${p.name()}"
                 class="w3-display-topleft w3-black w3-padding"></div>
            <div th:if="${isUserLoggedIn}"
                 class="w3-display-bottomright w3-row" style="width:100%">
                <a class="w3-half w3-button w3-blue">Edit</a>
                <a class="w3-half w3-button w3-red">Delete</a>
            </div>
        </div>
    </div>
</div>

<div th:if="${isUserLoggedIn}" class="w3-padding">
    <a class="w3-button w3-green" title="Add product" th:href="@{/add-product}">+</a>
</div>
